<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Register for an event</title>
</head>
<body>
    <header>
        <h1>
            Local Community Event Portal
        </h1>
    </header>
    <nav>
        <a href="dashboard.html">Home</a>
        <a href="events.html">Events</a>
        <a href="contact.html">Contact</a>
        <a href="help.html" target="_blank">Help</a>
        <a href="logout.html">Logout</a>
    </nav>
    <main>
        <h2>Event Registration Form</h2>
        <p>Complete this form to register for your chosen event. You'll receive a confirmation email with all event details.</p>
        
        <form action="registrationsuccessful.html">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your contact number" required>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Enter your address" required>
            </div>

            <div class="form-group">
                <label for="eventtype">Select Event</label>
                <select id="eventtype" name="eventtype" required>
                    <option value="">-- Choose an Event --</option>
                    <option value="summer-festival">Summer Festival - July 15, 2024</option>
                    <option value="cleanup">Community Cleanup - July 22, 2024</option>
                    <option value="sports">Sports Day - August 5, 2024</option>
                    <option value="cultural">Cultural Show - August 12, 2024</option>
                    <option value="workshop">Community Workshop - August 20, 2024</option>
                </select>
            </div>

            <div class="form-group">
                <label for="guests">Number of Guests (Including You)</label>
                <input type="number" id="guests" name="guests" min="1" max="10" value="1" required>
            </div>

            <div class="form-group">
                <label for="category">Age Category</label>
                <select id="category" name="category" required>
                    <option value="">-- Select Category --</option>
                    <option value="child">Child (Below 12)</option>
                    <option value="teen">Teen (12-18)</option>
                    <option value="adult">Adult (18-60)</option>
                    <option value="senior">Senior (Above 60)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="specialneeds">Special Requirements or Dietary Restrictions</label>
                <textarea id="specialneeds" name="specialneeds" rows="4" placeholder="Please mention any special needs or dietary restrictions"></textarea>
            </div>

            <div class="form-group">
                <label for="terms">
                    <input type="checkbox" id="terms" name="terms" required>
                    I agree to the terms and conditions of event participation
                </label>
            </div>

            <div class="form-group">
                <label for="newsletter">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    Subscribe to our newsletter for future events
                </label>
            </div>

            <button type="submit">Register for Event</button>
            <button type="reset">Clear Form</button>
        </form>
    </main>
    <footer>
        All rights registered | &copy; 2024 Local Community Event Portal
    </footer>
</body>
</html>
